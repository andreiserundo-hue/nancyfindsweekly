.crow{display:flex;justify-content:space-between;align-items:center;margin:6px 0 3px}.croas{font-family:Georgia,serif;font-size:19px;font-weight:700}.cmeta{font-size:10px;color:#BCB5C2}

</style></head><body>
<div class="nav">
  <div class="brand">Nancy Finds<small>LIVE DASHBOARD</small></div>
  <div style="margin-top:18px">
    <div class="navitem active" data-p="overview">◈ Overview</div>
    <div class="navitem" data-p="scorecard">▦ Scorecard</div>
    <div class="navitem" data-p="campaigns">📣 Campaigns</div>
    <div class="navitem" data-p="landing">🔗 Landing Pages</div>

  </div>

</div>
<div class="main">
  <div class="datebar" id="datebar"></div>
  <div class="sigbar" id="sigbar" style="display:none"></div>
  <div id="view"><div class="loading">Loading…</div></div>
  <div class="dlov" id="dlov"><div class="dlcard"><div class="spinner" id="dlspin"></div><div class="dlmsg" id="dlmsg">Generating…</div><div class="dlsub" id="dlsub"></div></div></div>
</div>
<div class="modal" id="modal" onclick="if(event.target===this)closeModal()"><span class="mclose" onclick="closeModal()">×</span><div class="mbox" id="mbox"></div></div>
<script>
const FX=7.8;
const usd=n=>'$'+Math.round(n).toLocaleString();
const usdH=n=>'$'+Math.round(n/FX).toLocaleString();
// strict: GREEN = above Best · AMBER = Good–Best · RED = below Good
const rc=v=>v>=2.0?'#1F9D6B':(v>=1.5?'#E0922F':'#DB3B3B');
const dot=(v,good,best)=>'<span class="dot" style="color:'+(v>=best?'#1F9D6B':(v>=good?'#E0922F':'#DB3B3B'))+'">●</span>';
const tier=v=>v>=2.1?['SCALE','#1F9D6B']:(v>=1.6?['HOLD','#E0922F']:['CUT','#DB3B3B']);
const clean=n=>(n||'').replace(/Nancy-Testing-2_/,'').replace(/https?:\/\/(www\.)?/,'');
const fmtD=d=>d.toISOString().slice(0,10);
function ago(n){const d=new Date();d.setDate(d.getDate()-n);return fmtD(d);}
const TODAY=fmtD(new Date()), YEST=ago(1);
const PRESETS={Today:[fmtD(new Date()),fmtD(new Date())],Yesterday:[YEST,YEST],'Last 7 Days':[ago(7),YEST],'Last 30 Days':[ago(30),YEST],'This Month':[fmtD(new Date()).slice(0,7)+'-01',YEST]};
let active={start:ago(7),end:YEST,label:'Last 7 Days',st:null,et:null};
const C={}; // range cache
async function getRange(s,e,st,et){const k=s+'_'+e+'_'+(st||'')+'_'+(et||'');if(C[k])return C[k];let q='/api/range?start='+s+'&end='+e;if(st&&et)q+='&st='+st+'&et='+et;const r=await fetch(q).then(x=>x.json());C[k]=r;return r;}
function days(s,e){return Math.max(1,Math.round((new Date(e)-new Date(s))/86400000)+1);}

// date bar — single dropdown + optional time
function renderDatebar(){const db=document.getElementById('datebar');
  const opts=Object.keys(PRESETS).concat('Custom').map(p=>'<option'+(active.label===p?' selected':'')+'>'+p+'</option>').join('');
  db.innerHTML='<b>Range</b><select id="rangeSel" class="pbtn" onchange="onRangeSel()" style="font-weight:600">'+opts+'</select>'+
  '<span id="customWrap" style="display:'+(active.label==='Custom'?'inline':'none')+'"> <input type="date" id="ds" value="'+active.start+'"> <span style="color:#8A8392">→</span> <input type="date" id="de" value="'+active.end+'"></span>'+
  ' <label style="font-size:12.5px;color:#8A8392"><input type="checkbox" id="tchk" '+(active.st?'checked':'')+' onchange="document.getElementById(\'twrap\').style.display=this.checked?\'inline\':\'none\'"> Add time</label>'+
  '<span id="twrap" style="display:'+(active.st?'inline':'none')+'"> <input type="time" id="ts" value="'+(active.st||'00:00')+'"> <span style="color:#8A8392">→</span> <input type="time" id="te" value="'+(active.et||'23:59')+'"></span>'+
  ' <button class="pbtn on" onclick="applyRange()">Apply</button>'+
  '<span style="flex:1"></span><button class="dlbtn" onclick="downloadPptx()">⬇ Download PPTX</button>'+
  '<span style="margin-left:10px;color:#8A8392;font-size:12px">'+active.start+(active.start!==active.end?' → '+active.end:'')+(active.st?' · '+active.st+'–'+active.et:'')+'</span>';}
function onRangeSel(){document.getElementById('customWrap').style.display=document.getElementById('rangeSel').value==='Custom'?'inline':'none';}
function applyRange(){const sel=document.getElementById('rangeSel').value;let s,e;if(sel==='Custom'){s=document.getElementById('ds').value;e=document.getElementById('de').value;}else{s=PRESETS[sel][0];e=PRESETS[sel][1];}const useT=document.getElementById('tchk').checked;active={start:s,end:e,label:sel,st:useT?document.getElementById('ts').value:null,et:useT?document.getElementById('te').value:null};renderDatebar();render();}

// next steps generator
function nextSteps(tab,d){
  let items=[];
  if(tab==='overview'||tab==='campaigns'){const c=(d&&d.campaigns)||[];c.filter(x=>x.spend>0&&x.roas<1.5).forEach(x=>items.push(['FIX',clean(x.name).substring(0,40)+' at '+x.roas.toFixed(2)+'x — rework creative/LP toward the winning funnel before adding budget.']));}
  if(tab==='landing'){const l=(d&&d.landing)||[];const w=l.filter(x=>x.roas>=1.5).sort((a,b)=>b.roas-a.roas)[0];if(w)items.push(['SCALE','Shift budget to '+clean(w.name).substring(0,34)+' ('+w.roas.toFixed(2)+'x) — your best LP this range.']);items.push(['REFRESH','Aura Scream LP cooled — refresh hook/offer and re-test with the new editorial creatives.']);}
  if(tab==='creatives'){const cr=(d&&d.creatives)||[];const w=cr.filter(x=>x.roas>=1.5).sort((a,b)=>b.roas-a.roas).slice(0,2);w.forEach(x=>items.push(['DOUBLE DOWN',clean(x.name).substring(0,36)+' ('+x.roas.toFixed(0)+'x) — feed into the ABO creative-test (HK$200/day, 20 creatives).']));items.push(['CUT','Pause studio shots running sub-0.7x; rebudget to editorial/lifestyle angles.']);}
  if(tab==='products'){items.push(['FOCUS','Keep spend on the suction line (Blossom Duo + Vine + Eclipse) — 84% of units.']);items.push(['STOCK','Stock/approve the reserved demand (Mushroom Cloud, Pebble Rose) to unlock held orders.']);}
  if(tab==='countries'){items.push(['GEO-WEIGHT','Test US-only ad sets — US is ~65% of revenue; trim low-converting geos from Top-15.']);}
  if(tab==='scorecard'||tab==='overview'){items.push(['UNBLOCK','Clear the fulfillment backlog — it is capping volume and driving refunds.']);items.push(['ESCALATE','Push Meta to approve a 2nd Business Manager / ad account (single-account risk).']);}
  if(!items.length)items.push(['—','No actions flagged for this range.']);
  return '<div class="ns"><h3>NEXT STEPS / ACTIONS</h3>'+items.map(i=>'<div class="i"><span class="b">'+i[0]+'</span><span>'+i[1]+'</span></div>').join('')+'</div>';

  msg.textContent='Building your weekly deck…';sub.textContent='Pulling live Glued + Shopify data and rendering 13 slides. This can take ~15–30s on the first run.';
  try{
    const r=await fetch('/api/pptx');
    if(!r.ok)throw new Error('server returned '+r.status);
    const blob=await r.blob();
    const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='Nancy Finds - Weekly Review.pptx';document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);
    sp.style.display='none';msg.textContent='✓ Your deck is ready';sub.textContent='Saved to your Downloads folder.';

const SCMETRICS=[
 {key:'rev',label:'Revenue / day',dir:'up',fmt:'usd',circ:true},
 {key:'spend',label:'Meta Spend / day',dir:'up',fmt:'usd',circ:false},
 {key:'spendPct',label:'Spend % of rev',dir:'down',fmt:'pct',circ:false},
 {key:'ord',label:'Orders / day',dir:'up',fmt:'num',circ:false},
 {key:'ret',label:'Return %',dir:'down',fmt:'pct1',circ:false},
 {key:'meta',label:'Meta ROAS',dir:'up',fmt:'roas',circ:true},
 {key:'true',label:'True ROAS (net)',dir:'up',fmt:'roas',circ:true}];
const DEFBM={rev:{g:1000,b:1500,x:2000},spend:{g:667,b:857,x:1000},spendPct:{g:67,b:57,x:50},ord:{g:17,b:25,x:33},ret:{g:4,b:3,x:2},meta:{g:1.5,b:1.75,x:2.0},'true':{g:1.5,b:1.75,x:2.0}};
function normBM(b){const o={};SCMETRICS.forEach(m=>{const d=DEFBM[m.key],v=(b&&b[m.key])||{};o[m.key]={g:isNaN(+v.g)?d.g:+v.g,b:isNaN(+v.b)?d.b:+v.b,x:isNaN(+v.x)?d.x:+v.x};});return o;}
function fmtB(t,v){if(t==='usd')return '$'+Math.round(v).toLocaleString();if(t==='pct')return Math.round(v)+'%';if(t==='pct1')return (Math.round(v*10)/10)+'%';if(t==='roas')return (+v).toFixed(2);return Math.round(v);}
function dotD(dir,v,g,x){const green=dir==='up'?v>=x:v<=x,amber=dir==='up'?v>=g:v<=g;return '<span class="dot" style="color:'+(green?'#1F9D6B':(amber?'#E0922F':'#DB3B3B'))+'">●</span>';}
function roundNice(v,fmt){if(fmt==='roas')return Math.round(v*100)/100;if(fmt==='usd')return Math.round(v/10)*10;return Math.round(v*10)/10;}

  const cards=list.map((c,i)=>{const col=rc(c.roas),t=tier(c.roas);const im=c.img?'<img class="cimg" src="'+c.img+'">':'<div class="cimg" style="display:flex;align-items:center;justify-content:center;color:#8A8392;font-size:11px">no image</div>';
    return '<div class="ccard" onclick="openCre('+i+')">'+im+'<div class="cbody"><div class="cname">'+clean(c.name).substring(0,38)+'</div><div class="crow"><span class="croas" style="color:'+col+'">'+c.roas.toFixed(2)+'x</span><span class="pill" style="background:'+t[1]+'">'+t[0]+'</span></div><div class="cmeta">'+usdH(c.spend)+' · '+c.buys+' buys</div></div></div>';}).join('');
  return '<h1>Creatives — Ads Analysis</h1><div class="cap">'+active.label+' · '+note+'</div><div class="cgrid">'+(cards||'<div class="cap">No creative spend in this range</div>')+'</div>';
}
function openCre(i){const c=window._cre[i];if(!c)return;const t=tier(c.roas);
  const im=c.img?'<img class="mimg" src="'+c.img+'">':'<div class="mimg" style="display:flex;align-items:center;justify-content:center;color:#8A8392;width:300px">no image</div>';
  const row=(k,v)=>'<div class="mrow"><b>'+k+'</b><span>'+v+'</span></div>';
  document.getElementById('mbox').innerHTML=im+'<div class="mbody"><h2 style="margin-bottom:10px">'+clean(c.name)+'</h2>'+
    '<div style="margin-bottom:12px"><span class="croas" style="color:'+rc(c.roas)+';font-size:30px">'+c.roas.toFixed(2)+'x</span> <span class="pill" style="background:'+t[1]+'">'+t[0]+'</span></div>'+
    row('Spend',usdH(c.spend))+row('Purchases',c.buys)+row('CPA',c.cpa?usdH(c.cpa):'—')+row('Type',c.type||'image')+row('Status',c.status||'—')+
    row('Campaign',clean(c.campaign||'—').substring(0,46))+row('Ad set',clean(c.adset||'—').substring(0,46))+(c.lp?row('Landing page',clean(c.lp).substring(0,46)):'')+
    '</div>';
  document.getElementById('modal').classList.add('show');}
function closeModal(){document.getElementById('modal').classList.remove('show');}
async function openHourly(){const date=active.end;document.getElementById('mbox').innerHTML='<div class="mbody"><div class="loading">Loading hourly for '+date+'…</div></div>';document.getElementById('modal').classList.add('show');
  try{const j=await fetch('/api/hourly?date='+date).then(x=>x.json());const rows=(j.rows||[]);
  // aggregate by hour across campaigns
  const byH={};rows.forEach(r=>{const h=(r.hour!=null?r.hour:(r.ad_time||r.time||'').toString().slice(11,13));const m=r.metrics||r;const sp=+(m.spend||0),rev=+(m.revenue||0),bu=+(m.purchase_count||0);if(!byH[h])byH[h]={spend:0,rev:0,buys:0};byH[h].spend+=sp;byH[h].rev+=rev;byH[h].buys+=bu;});
  const hrs=Object.keys(byH).sort();const max=Math.max(...hrs.map(h=>byH[h].spend),1);
  let html='<div class="mbody" style="width:100%"><h2>Hourly — '+date+'</h2><div class="sub2">Meta spend & revenue by hour (HKT)</div>';
  if(!hrs.length){html+='<div class="loading">No hourly data yet for '+date+'</div>';}
  else{html+='<div class="hbar">'+hrs.map(h=>'<div title="'+h+':00 — spend '+usdH(byH[h].spend)+', rev '+usdH(byH[h].rev)+', buys '+byH[h].buys+'" style="flex:1;background:#C44B6E;border-radius:2px 2px 0 0;height:'+Math.max(2,byH[h].spend/max*140)+'px"></div>').join('')+'</div>'+
    '<div style="display:flex;justify-content:space-between;color:#8A8392;font-size:9px">'+hrs.map(h=>'<span>'+h+'</span>').join('')+'</div>'+
    '<table style="margin-top:14px"><tr><th>Hour</th><th>Spend</th><th>Revenue</th><th>Buys</th><th>ROAS</th></tr>'+hrs.map(h=>{const v=byH[h];const ro=v.spend>0?v.rev/v.spend:0;return '<tr><td class="lh">'+h+':00</td><td>'+usdH(v.spend)+'</td><td>'+usdH(v.rev)+'</td><td>'+v.buys+'</td><td style="color:'+rc(ro)+';font-weight:700">'+ro.toFixed(2)+'</td></tr>';}).join('')+'</table>';}
  html+='</div>';document.getElementById('mbox').innerHTML=html;
  }catch(e){document.getElementById('mbox').innerHTML='<div class="mbody"><div class="loading">Hourly error: '+e.message+'</div></div>';}}
async function pageProducts(){const d=await getRange(active.start,active.end,active.st,active.et);const sale=['Blossom Duo','Vine','Eclipse','Bloom','Stem','Sprout'];const pr=d.shop.products;const tot=Object.values(pr).reduce((a,p)=>a+p.units,0)||1;const max=Math.max(...sale.map(n=>(pr[n]||{units:0}).units),1);
  const rows=sale.map(n=>{const p=pr[n]||{units:0,rev:0};return '<tr><td class="lh">'+n+'</td><td><div style="display:flex;align-items:center;gap:8px"><div class="barbg"><div class="bar" style="width:'+(p.units/max*100)+'%"></div></div><b>'+p.units+'</b></div></td><td>'+usd(p.rev)+'</td><td>'+Math.round(p.units/tot*100)+'%</td></tr>';}).join('');
  return '<h1>Orders by Product</h1><div class="cap">'+active.label+' · saleable suction line</div><div class="card"><table><tr><th>Product</th><th>Units</th><th>Revenue</th><th>% Units</th></tr>'+rows+'</table></div>';
}
async function pageCountries(){const d=await getRange(active.start,active.end,active.st,active.et);const co=Object.entries(d.shop.countries).sort((a,b)=>b[1].net-a[1].net).slice(0,8);const tot=Object.values(d.shop.countries).reduce((a,c)=>a+c.net,0)||1;const max=co[0]?co[0][1].net:1;
  const rows=co.map(([c,v])=>'<tr><td class="lh">'+c+'</td><td>'+v.orders+'</td><td><div style="display:flex;align-items:center;gap:8px"><div class="barbg"><div class="bar" style="width:'+(v.net/max*100)+'%"></div></div><b>'+usd(v.net)+'</b></div></td><td>'+Math.round(v.net/tot*100)+'%</td></tr>').join('');
  return '<h1>Sales by Country</h1><div class="cap">'+active.label+' · net revenue</div><div class="card"><table><tr><th>Country</th><th>Orders</th><th>Revenue</th><th>% Rev</th></tr>'+rows+'</table></div>';
}
async function pageStrategy(){
  // Strategy is PRIORITY-driven, not filter-driven: always from a fixed L7D window
  const [l7,tasks,ov]=await Promise.all([getRange(...PRESETS['Last 7 Days']),fetch('/api/tasks').then(x=>x.json()).catch(()=>[]),fetch('/api/suggestions').then(x=>x.json()).catch(()=>({}))]);
  window._sugOv=ov||{};window._tasks=tasks;
  const sug=[];
  (l7.creatives||[]).filter(c=>c.buys>0&&c.roas>=1.75).sort((a,b)=>b.roas-a.roas).slice(0,3).forEach(c=>sug.push({c:'#1F9D6B',cat:'DOUBLE DOWN',t:'Scale '+clean(c.name).substring(0,30)+' ('+c.roas.toFixed(1)+'x, '+c.buys+' buys) into the ABO creative-test (HK$200/day, ~20 creatives).'}));
  (l7.landing||[]).filter(l=>l.spend>0&&l.roas>=1.5).sort((a,b)=>b.roas-a.roas).slice(0,2).forEach(l=>sug.push({c:'#1F9D6B',cat:'DOUBLE DOWN',t:'Shift budget to '+clean(l.name)+' ('+l.roas.toFixed(2)+'x) and route paid traffic through it.'}));
  (l7.campaigns||[]).filter(c=>c.spend>0&&c.roas<1.2).sort((a,b)=>b.spend-a.spend).forEach(c=>sug.push({c:'#DB3B3B',cat:'FIX / CUT',t:'Rework or cut '+clean(c.name).substring(0,30)+' — '+usdH(c.spend)+' at '+c.roas.toFixed(2)+'x. Move toward the winning funnel or stop the bleed.'}));
  const wasteful=(l7.creatives||[]).filter(c=>c.spend>500&&c.buys===0);
  if(wasteful.length)sug.push({c:'#DB3B3B',cat:'FIX / CUT',t:'Pause '+wasteful.length+' creative(s) spending with 0 purchases; rebudget to editorial/lifestyle angles.'});
  const co=Object.entries(l7.shop.countries).sort((a,b)=>b[1].net-a[1].net)[0];const tot=Object.values(l7.shop.countries).reduce((a,c)=>a+c.net,0)||1;
  if(co)sug.push({c:'#1F9D6B',cat:'GEO',t:co[0]+' is '+Math.round(co[1].net/tot*100)+'% of revenue — test '+co[0]+'-only ad sets for efficiency.'});
  sug.push({c:'#E0922F',cat:'REFRESH',t:'Refresh the Aura Scream LP hook/offer (cooled from ~1.79x) and re-test with the new editorial creatives.'});
  sug.push({c:'#E0922F',cat:'REFRESH',t:'On the Scream LP, demote competitors below the 3 Nancy products they currently outrank.'});
  // context-driven suggestions — synced with the Situation Room (and its linked board tasks)
  if(sigActive('backlog'))sug.push({c:'#8E2F4C',cat:'STRUCTURAL',t:'Clear the fulfillment backlog (returns '+l7.shop.retPct.toFixed(0)+'% L7D) — it caps volume and triggers chargeback/Shopify-flag risk. Unthrottle spend once cleared.'});
  if(sigActive('duo-lp'))sug.push({c:'#E0922F',cat:'REFRESH',t:'Launch the Blossom Duo LP test — https://home.nancyfinds.com/duo/ — then check off the board task. Compare ROAS vs control; scale if it wins, kill after 5–7 days if not.'});
  sug.push({c:'#8E2F4C',cat:'STRUCTURAL',t:'Escalate a 2nd Meta Business Manager / ad account — one ban halts all paid acquisition.'});
  // order by urgency (most urgent first), not by data window
  const CATPRI={'FIX / CUT':0,'STRUCTURAL':1,'REFRESH':2,'DOUBLE DOWN':3,'GEO':4};
  sug.sort((a,b)=>(CATPRI[a.cat]==null?9:CATPRI[a.cat])-(CATPRI[b.cat]==null?9:CATPRI[b.cat]));
  // apply saved edits / dismissals (keyed by a stable hash of the original text)
  sug.forEach(s=>{s.key=hashStr(s.cat+'|'+s.t);});
  const visible=sug.filter(s=>!(ov[s.key]&&ov[s.key].hidden));
  visible.forEach(s=>{s.disp=(ov[s.key]&&ov[s.key].text)?ov[s.key].text:s.t;s.edited=!!(ov[s.key]&&ov[s.key].text);});
  window._sug=visible;
  const hiddenCount=sug.length-visible.length;
  const sugHtml=visible.map((s,i)=>{
    if(window._sugEdit===i){return '<div class="sug"><div class="sug-t"><span class="sdot" style="background:'+s.c+'"></span><b style="color:'+s.c+'">'+s.cat+'</b></div>'+
      '<textarea class="sugedit" id="sugedit">'+escapeHtml(s.disp)+'</textarea>'+
      '<div style="display:flex;gap:8px;margin-top:8px"><button class="addbtn solid" onclick="saveSugEdit('+i+')">Save</button><button class="addbtn" onclick="window._sugEdit=null;render()">Cancel</button></div></div>';}
    const url=firstUrl(s.disp);
    return '<div class="sug"><div class="sug-t"><span class="sdot" style="background:'+s.c+'"></span><b style="color:'+s.c+'">'+s.cat+'</b>'+(s.edited?'<span class="editedtag">edited</span>':'')+
      '<span style="flex:1"></span><span class="sicon" title="edit" onclick="window._sugEdit='+i+';render()">✎</span><span class="sicon" title="dismiss" onclick="dismissSug('+i+')">×</span></div>'+
      '<div class="sug-d">'+linkify(s.disp)+'</div>'+(url?previewSlot(url):'')+'<button class="addbtn" onclick="addSug('+i+')">+ Add to board</button></div>';}).join('');
  const open=tasks.filter(t=>!t.done), done=tasks.filter(t=>t.done);
  const openHtml=open.length?open.map(taskRow).join(''):'<div class="empty">No open tasks — add one above or from a suggestion.</div>';
  const doneHtml=done.length?done.map(taskRow).join(''):'<div class="empty">Nothing completed yet.</div>';
  return '<h1>Strategy &amp; Next Steps</h1><div class="cap">Priority-ordered (most urgent first) · fixed last-7-days view, not affected by the date filter · the Situation Room syncs context across every tab</div>'+
  situationRoom()+
  '<div class="stratgrid">'+
  '<div class="stratcard"><h2>💡 Suggested Actions</h2><div class="sub2">last 7 days · most urgent first · ✎ edit · × dismiss · + add to board'+((Object.keys(ov).length)?' · <a class="ilink" style="cursor:pointer" onclick="resetSug()">reset all</a>'+(hiddenCount?' ('+hiddenCount+' hidden)':''):'')+'</div>'+sugHtml+'</div>'+
  '<div class="stratcard"><h2>✅ Action Board</h2><div class="sub2">add your own next steps, check them off, delete what no longer fits</div>'+
    '<div class="addrow"><input id="newtask" maxlength="200" placeholder="Add a next step…" onkeydown="if(event.key===\'Enter\')addTask()"><button class="addbtn solid" onclick="addTask()">Add</button></div>'+
    '<div class="tlabel">OPEN ('+open.length+')</div><div>'+openHtml+'</div>'+
    '<div class="tlabel">COMPLETED ('+done.length+')</div><div>'+doneHtml+'</div>'+
  '</div></div>';
}
function taskRow(t){const url=firstUrl(t.text);return '<div class="trow'+(t.done?' done':'')+'"><div class="tmain"><label><input type="checkbox" '+(t.done?'checked':'')+' onchange="toggleTask(\''+t.id+'\',this.checked)"><span>'+linkify(t.text)+'</span></label>'+(url?previewSlot(url):'')+'</div><button class="del" onclick="delTask(\''+t.id+'\')" title="delete">×</button></div>';}
function escapeHtml(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
// ---- link detection + preview ----
const URLRE=/(https?:\/\/[^\s<]+|(?:www\.)[^\s<]+|[a-z0-9-]+(?:\.[a-z0-9-]+)+\.[a-z]{2,}(?:\/[^\s<]*)?)/gi;
function toHref(m){return /^https?:\/\//i.test(m)?m:'https://'+m;}
function firstUrl(text){const m=(text||'').match(URLRE);return m?toHref(m[0].replace(/[.,)]+$/,'')):null;}
function linkify(text){return escapeHtml(text).replace(URLRE,m=>{const clean=m.replace(/[.,)]+$/,'');return '<a href="'+toHref(clean)+'" target="_blank" rel="noopener" class="ilink">'+clean+'</a>'+m.slice(clean.length);});}
function previewSlot(url){return '<div class="lprev" data-url="'+escapeHtml(url)+'"></div>';}
async function loadPreviews(){const els=document.querySelectorAll('.lprev[data-url]:not([data-done])');for(const el of els){el.setAttribute('data-done','1');const url=el.getAttribute('data-url');el.innerHTML='<div class="lprev-load">loading preview…</div>';try{const p=await fetch('/api/preview?url='+encodeURIComponent(url)).then(x=>x.json());if(p&&(p.title||p.image)){el.innerHTML='<a class="lprev-card" href="'+escapeHtml(p.url||url)+'" target="_blank" rel="noopener">'+(p.image?'<img class="lprev-img" src="'+escapeHtml(p.image)+'" onerror="this.style.display=\'none\'">':'')+'<div class="lprev-body"><div class="lprev-title">'+escapeHtml(p.title||p.host||url)+'</div>'+(p.desc?'<div class="lprev-desc">'+escapeHtml(p.desc)+'</div>':'')+'<div class="lprev-host">'+escapeHtml(p.host||'')+' ↗</div></div></a>';}else{el.innerHTML='<a class="lprev-host" href="'+escapeHtml(url)+'" target="_blank" rel="noopener">'+escapeHtml(url)+' ↗</a>';}}catch(e){el.innerHTML='';}}}
async function addTask(){const el=document.getElementById('newtask');const text=(el.value||'').trim();if(!text)return;el.value='';await fetch('/api/tasks',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text})});await refreshSignals();render();}
async function addSug(i){const s=window._sug[i];if(!s)return;await fetch('/api/tasks',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:'['+s.cat+'] '+(s.disp||s.t)})});await refreshSignals();render();}
function hashStr(s){let h=5381;for(let i=0;i<s.length;i++)h=((h<<5)+h+s.charCodeAt(i))|0;return 'h'+(h>>>0).toString(36);}
async function saveSugEdit(i){const s=window._sug[i];if(!s)return;const txt=(document.getElementById('sugedit').value||'').trim();window._sugEdit=null;if(!txt){render();return;}await fetch('/api/suggestions',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key:s.key,text:txt})});render();}
async function dismissSug(i){const s=window._sug[i];if(!s)return;await fetch('/api/suggestions',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key:s.key,hidden:true})});render();}
async function resetSug(){await fetch('/api/suggestions',{method:'DELETE'});render();}
async function toggleTask(id,done){await fetch('/api/tasks?id='+encodeURIComponent(id),{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({done})});await refreshSignals();render();}
async function delTask(id){await fetch('/api/tasks?id='+encodeURIComponent(id),{method:'DELETE'});await refreshSignals();render();}
const PAGES={overview:pageOverview,scorecard:pageScorecard,campaigns:pageCampaigns,landing:pageLanding,creatives:pageCreatives,products:pageProducts,countries:pageCountries,strategy:pageStrategy};
let current='overview';
async function render(){document.getElementById('view').innerHTML='<div class="loading">Loading '+current+'… (pulling Glued + Shopify)</div>';try{document.getElementById('view').innerHTML=await PAGES[current]();loadPreviews();}catch(e){document.getElementById('view').innerHTML='<div class="loading">Error: '+e.message+'</div>';}}
document.querySelectorAll('.navitem').forEach(n=>n.onclick=()=>{document.querySelectorAll('.navitem').forEach(x=>x.classList.remove('active'));n.classList.add('active');current=n.dataset.p;render();});
renderDatebar();refreshSignals().then(render);
</script></body></html>
